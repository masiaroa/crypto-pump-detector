name: API Viability Test

# Run manually to verify that exchange APIs are reachable from GitHub Actions runners.
# Check the logs: ✅ = OK, ❌ = blocked/error.

on:
  workflow_dispatch:

jobs:
  test-apis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Raw HTTP checks ──────────────────────────────────────────────────

      - name: "Bybit — kline (candlestick)"
        run: |
          RESP=$(curl -sf --max-time 15 \
            "https://api.bybit.com/v5/market/kline?category=linear&symbol=BTCUSDT&interval=D&limit=3" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('retCode:', d.get('retCode'), '| candles:', len(d['result']['list']))")
          echo "✅ Bybit kline: $RESP"

      - name: "Bybit — Open Interest history"
        run: |
          RESP=$(curl -sf --max-time 15 \
            "https://api.bybit.com/v5/market/open-interest?category=linear&symbol=BTCUSDT&intervalTime=1d&limit=3" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('retCode:', d.get('retCode'), '| rows:', len(d['result']['list']))")
          echo "✅ Bybit OI: $RESP"

      - name: "Bybit — Funding rate history"
        run: |
          RESP=$(curl -sf --max-time 15 \
            "https://api.bybit.com/v5/market/funding/history?category=linear&symbol=BTCUSDT&limit=3" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('retCode:', d.get('retCode'), '| rows:', len(d['result']['list']))")
          echo "✅ Bybit Funding: $RESP"

      - name: "Binance USDT-M — kline"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=1d&limit=3")
          [ "$CODE" = "200" ] && echo "✅ Binance USDT-M kline: HTTP $CODE" || echo "❌ Binance USDT-M kline: HTTP $CODE (blocked?)"

      - name: "Binance USDT-M — OI historical"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://fapi.binance.com/futures/data/openInterestHist?symbol=BTCUSDT&period=1d&limit=3")
          [ "$CODE" = "200" ] && echo "✅ Binance USDT-M OI: HTTP $CODE" || echo "❌ Binance USDT-M OI: HTTP $CODE (blocked?)"

      - name: "Binance COIN-M — kline (BCHUSD_PERP)"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://dapi.binance.com/dapi/v1/klines?symbol=BCHUSD_PERP&interval=1d&limit=3")
          [ "$CODE" = "200" ] && echo "✅ Binance COIN-M kline: HTTP $CODE" || echo "❌ Binance COIN-M kline: HTTP $CODE (blocked?)"

      # ── Full Python scan test ────────────────────────────────────────────

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: "Python — fetch BYBIT:BTCUSDT.P (1d, 10 candles)"
        run: |
          PYTHONPATH=src python - <<'EOF'
          from pump_detector.data_clients import fetch_market_data, DataUnavailable
          try:
              d = fetch_market_data("BYBIT:BTCUSDT.P", "1d", limit=10)
              print(f"✅ BYBIT BTCUSDT  via {d.provider}: {len(d.candles)} candles")
              print(d.candles[["timestamp","close","open_interest","funding_rate"]].tail(3).to_string(index=False))
          except DataUnavailable as e:
              print(f"❌ BYBIT BTCUSDT: {e}")
              raise SystemExit(1)
          EOF

      - name: "Python — fetch BINANCE:BCHUSD.P (1d, 10 candles)"
        run: |
          PYTHONPATH=src python - <<'EOF'
          from pump_detector.data_clients import fetch_market_data, DataUnavailable
          try:
              d = fetch_market_data("BINANCE:BCHUSD.P", "1d", limit=10)
              print(f"✅ BINANCE BCH  via {d.provider}: {len(d.candles)} candles")
              print(d.candles[["timestamp","close","open_interest","funding_rate"]].tail(3).to_string(index=False))
          except DataUnavailable as e:
              print(f"❌ BINANCE BCH: {e}")
              # Non-fatal: Bybit fallback might cover this
          EOF

      - name: "Python — full watchlist scan (summary)"
        continue-on-error: true
        run: |
          PYTHONPATH=src python - <<'EOF'
          from pump_detector.scanner import scan_watchlist
          df, details = scan_watchlist(persist=False)
          ok    = df[df["close"] > 0]
          fails = df[df["close"] == 0]
          print(f"✅ Scan complete: {len(ok)}/{len(df)} symbols OK, {len(details)} chart series")
          if not fails.empty:
              print("❌ Failed symbols:")
              print(fails[["symbol","notes"]].to_string(index=False))
          EOF

