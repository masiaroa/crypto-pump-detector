name: API Viability Test

# Run manually to verify that exchange APIs are reachable from GitHub Actions runners.
# All steps use continue-on-error so ALL results are visible even if some APIs are blocked.

on:
  workflow_dispatch:

jobs:
  test-apis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Raw HTTP checks (no -f flag so we always capture the response body) ──

      - name: "Bybit — kline HTTP status + response preview"
        continue-on-error: true
        run: |
          BODY=$(curl -s --max-time 15 \
            "https://api.bybit.com/v5/market/kline?category=linear&symbol=BTCUSDT&interval=D&limit=3")
          echo "Response: ${BODY:0:300}"
          echo "$BODY" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              rows = len(d.get('result', {}).get('list', []))
              print(f'✅ Bybit kline: retCode={d.get(\"retCode\")} | candles={rows}')
          except Exception as e:
              print(f'❌ Bybit kline: {e}')
              raise SystemExit(1)
          "

      - name: "Bybit — Open Interest HTTP status + response preview"
        continue-on-error: true
        run: |
          BODY=$(curl -s --max-time 15 \
            "https://api.bybit.com/v5/market/open-interest?category=linear&symbol=BTCUSDT&intervalTime=1d&limit=3")
          echo "Response: ${BODY:0:300}"
          echo "$BODY" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              rows = len(d.get('result', {}).get('list', []))
              print(f'✅ Bybit OI: retCode={d.get(\"retCode\")} | rows={rows}')
          except Exception as e:
              print(f'❌ Bybit OI: {e}')
              raise SystemExit(1)
          "

      - name: "Bybit — Funding rate HTTP status + response preview"
        continue-on-error: true
        run: |
          BODY=$(curl -s --max-time 15 \
            "https://api.bybit.com/v5/market/funding/history?category=linear&symbol=BTCUSDT&limit=3")
          echo "Response: ${BODY:0:300}"
          echo "$BODY" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              rows = len(d.get('result', {}).get('list', []))
              print(f'✅ Bybit Funding: retCode={d.get(\"retCode\")} | rows={rows}')
          except Exception as e:
              print(f'❌ Bybit Funding: {e}')
              raise SystemExit(1)
          "

      - name: "Binance USDT-M — kline"
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=1d&limit=3")
          [ "$STATUS" = "200" ] \
            && echo "✅ Binance USDT-M kline: HTTP $STATUS" \
            || echo "❌ Binance USDT-M kline: HTTP $STATUS (likely geo-blocked)"

      - name: "Binance USDT-M — OI historical"
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://fapi.binance.com/futures/data/openInterestHist?symbol=BTCUSDT&period=1d&limit=3")
          [ "$STATUS" = "200" ] \
            && echo "✅ Binance USDT-M OI: HTTP $STATUS" \
            || echo "❌ Binance USDT-M OI: HTTP $STATUS (likely geo-blocked)"

      - name: "Binance COIN-M — kline (BCHUSD_PERP)"
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://dapi.binance.com/dapi/v1/klines?symbol=BCHUSD_PERP&interval=1d&limit=3")
          [ "$STATUS" = "200" ] \
            && echo "✅ Binance COIN-M kline: HTTP $STATUS" \
            || echo "❌ Binance COIN-M kline: HTTP $STATUS (likely geo-blocked)"

      # ── Full Python scan (uses existing fallback logic in data_clients.py) ──

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: "Python — fetch BYBIT:BTCUSDT.P (1d, 10 candles)"
        continue-on-error: true
        run: |
          PYTHONPATH=src python - <<'EOF'
          from pump_detector.data_clients import fetch_market_data, DataUnavailable
          try:
              d = fetch_market_data("BYBIT:BTCUSDT.P", "1d", limit=10)
              last = d.candles.iloc[-1]
              print(f"✅ BYBIT BTCUSDT via {d.provider}: {len(d.candles)} candles")
              print(f"   close={last['close']}  OI={last.get('open_interest')}  FR={last.get('funding_rate')}")
          except Exception as e:
              print(f"❌ BYBIT BTCUSDT: {type(e).__name__}: {e}")
              raise SystemExit(1)
          EOF

      - name: "Python — fetch BINANCE:BCHUSD.P (1d, 10 candles)"
        continue-on-error: true
        run: |
          PYTHONPATH=src python - <<'EOF'
          from pump_detector.data_clients import fetch_market_data, DataUnavailable
          try:
              d = fetch_market_data("BINANCE:BCHUSD.P", "1d", limit=10)
              last = d.candles.iloc[-1]
              print(f"✅ BINANCE BCH via {d.provider}: {len(d.candles)} candles")
              print(f"   close={last['close']}  OI={last.get('open_interest')}")
          except Exception as e:
              print(f"❌ BINANCE BCH (Bybit fallback also tried): {type(e).__name__}: {e}")
          EOF

      - name: "Python — full watchlist scan summary"
        continue-on-error: true
        run: |
          PYTHONPATH=src python - <<'EOF'
          from pump_detector.scanner import scan_watchlist
          df, details = scan_watchlist(persist=False)
          ok    = df[df["close"] > 0]
          fails = df[df["close"] == 0]
          print(f"Scan result: {len(ok)}/{len(df)} symbols OK | {len(details)} chart series")
          print()
          if not ok.empty:
              print("✅ Working symbols:")
              for _, r in ok[["symbol", "close"]].iterrows():
                  print(f"   {r['symbol']:<32} close={r['close']}")
          if not fails.empty:
              print()
              print("❌ Failed symbols:")
              for _, r in fails[["symbol", "notes"]].iterrows():
                  print(f"   {r['symbol']:<32} {str(r['notes'])[:80]}")
          EOF

