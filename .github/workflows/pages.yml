name: Build & Deploy Dashboard

# Triggers:
#   • Daily at 02:00 UTC (after Asia close)
#   • Manual dispatch (Actions tab → "Run workflow")
#   • Push to main when source code or config changes

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "src/**"
      - "scripts/**"

# Write access needed to commit docs/index.html back to the repo
permissions:
  contents: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so we can push back
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan (fetch live data from exchanges)
        run: PYTHONPATH=src python scripts/scan.py

      - name: Build static HTML dashboard
        run: python scripts/build_html.py

      - name: Show generated file info
        run: |
          ls -lh docs/index.html
          echo "Slides: $(grep -c 'class=\"slide\"' docs/index.html)"

      - name: Commit and push docs/index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/latest_scan.csv data/event_history.csv
          # Only commit if something actually changed
          git diff --staged --quiet \
            && echo "Nothing changed — skipping commit" \
            || (git commit -m "chore(docs): update dashboard $(date -u +%Y-%m-%dT%H:%M)Z [skip ci]" \
                && git push)
