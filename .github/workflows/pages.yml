name: Build & Deploy Dashboard

# Los datos se generan fuera de GitHub Actions (los runners están en Azure y
# Bybit/Binance bloquean esos rangos IP con 403/451). El refresh corre en local
# vía scripts/refresh.sh y commitea data/charts y data/liquidations. Este
# workflow solo construye el HTML estático y lo despliega en Pages.
#
# Triggers:
#   • Manual dispatch (Actions tab → "Run workflow")
#   • Push a main cuando cambian fuentes, config o datos

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "src/**"
      - "scripts/**"
      - "data/charts/**"
      - "data/liquidations/**"
      - "data/latest_scan.csv"
      - "data/event_history.csv"

# Pages artifact deployment. Generated files are published without commits.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static HTML dashboard
        run: PYTHONPATH=src python scripts/build_html.py

      - name: Validate static HTML dashboard
        run: python scripts/validate_static_html.py docs/index.html

      - name: Show generated file info
        run: |
          ls -lh docs/index.html
          echo "Slides: $(grep -c 'class=\"slide\"' docs/index.html)"
          echo "Chart JSON files: $([ -d data/charts ] && find data/charts -name '*.json' | wc -l || echo 0)"
          echo "Liquidation JSON files: $([ -d data/liquidations ] && find data/liquidations -name '*.json' ! -name '_*' | wc -l || echo 0)"
          echo "WS history lines: $([ -f data/liquidations/_ws_history.jsonl ] && wc -l < data/liquidations/_ws_history.jsonl || echo 0)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
