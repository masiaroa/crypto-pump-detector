name: Build & Deploy Dashboard

# Triggers:
#   • Daily at 02:00 UTC (after Asia close)
#   • Manual dispatch (Actions tab → "Run workflow")
#   • Push to main when source code or config changes

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "src/**"
      - "scripts/**"

# Pages artifact deployment. Generated files are published without commits.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect liquidation burst (best-effort, public WS)
        continue-on-error: true
        timeout-minutes: 2
        run: |
          PYTHONPATH=src python -m pump_detector.liquidations.executed_ws \
            --duration 30 \
            --out data/liquidations/_ws_history.jsonl

      - name: Run scan (fetch live data from exchanges)
        run: PYTHONPATH=src python scripts/scan.py

      - name: Build static HTML dashboard
        run: PYTHONPATH=src python scripts/build_html.py

      - name: Validate static HTML dashboard
        run: python scripts/validate_static_html.py docs/index.html

      - name: Show generated file info
        run: |
          ls -lh docs/index.html
          echo "Slides: $(grep -c 'class=\"slide\"' docs/index.html)"
          echo "Chart JSON files: $([ -d data/charts ] && find data/charts -name '*.json' | wc -l || echo 0)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
