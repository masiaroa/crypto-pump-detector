timeframes:
- 4h

alert_conditions:
  require_price_impulse: true
  require_oi_impulse: true
  require_first_impulse: true
  require_volume_confirmation: false
  require_breakout_20: false
  require_sma200_reclaim: false
  allowed_funding_classes:
  - NEGATIVE
  - NEUTRAL
  - POSITIVE
  - HOT

thresholds:
  lookback_stats: 100
  lookback_no_previous_signal: 10
  price_zscore_threshold: 2.5
  oi_zscore_threshold: 2.5
  volume_zscore_threshold: 1.5
  close_position_min: 0.65
  funding_hot_threshold: 0.0005
  funding_extreme_percentile: 95
  max_recent_price_run_pct: 0.45
  max_consecutive_oi_expansion: 3

storage:
  sqlite_path: data/signals.sqlite
  alerts_csv: data/alerts.csv

liquidations:
  enabled: true
  executed:
    # Desactivado por defecto: la app usa Coinalyze historico, no realtime.
    enabled: false
    providers:
    - binance_ws
    - bybit_ws
    - okx_ws
    burst_seconds: 30
    history_file: data/liquidations/_ws_history.jsonl
    max_age_days: 14
    auto_burst_on_startup: false
    auto_burst_seconds: 20
    auto_burst_min_interval_minutes: 5
  projected:
    # Desactivado: los mapas de liquidaciones pendientes no tienen fuente gratis fiable.
    # CoinGlass Liquidation Map requiere API/key de pago; no se usa en modo free.
    enabled: false
    provider: coinglass
    use_frontend_endpoint: false
    require_paid: false
  coinalyze:
    # Fuente principal: liquidaciones historicas agregadas (free tier). Requiere registro en
    # https://coinalyze.net/account/api-key/ y export COINALYZE_API_KEY=...
    # Sin key se omite silenciosamente. 40 req/min.
    enabled: true
