timeframes:
- 4h
- 1d

alert_conditions:
  require_price_impulse: true
  require_oi_impulse: true
  require_first_impulse: true
  require_volume_confirmation: false
  require_breakout_20: false
  require_sma200_reclaim: false
  allowed_funding_classes:
  - NEGATIVE
  - NEUTRAL
  - POSITIVE
  - HOT

thresholds:
  lookback_stats: 100
  lookback_no_previous_signal: 10
  price_zscore_threshold: 2.5
  oi_zscore_threshold: 2.5
  volume_zscore_threshold: 1.5
  close_position_min: 0.65
  funding_hot_threshold: 0.0005
  funding_extreme_percentile: 95
  max_recent_price_run_pct: 0.45
  max_consecutive_oi_expansion: 3
  oi_surge_3bar_pct: 0.04
  volume_surge_3bar_ratio: 2.5

storage:
  sqlite_path: data/signals.sqlite
  alerts_csv: data/alerts.csv

liquidations:
  enabled: true
  coinalyze:
    # Fuente unica: liquidaciones historicas agregadas (free tier). Requiere registro en
    # https://coinalyze.net/account/api-key/ y export COINALYZE_API_KEY=...
    # Sin key se omite silenciosamente. 40 req/min.
    enabled: true

basis:
  enabled: true            # prima del perpetuo (premium index) como señal de posicionamiento
  hot_threshold: 0.0008    # basis por encima de esto = longs masificados (HOT)
  history_limit: 200       # velas de historial de basis (1 request por simbolo)

squeeze:
  enabled: true
  lookback_divergence: 20      # velas para medir divergencia OI-precio
  oi_build_min_pct: 0.05       # OI debe subir >=5% en el lookback
  price_flat_max_pct: 0.02     # ...con el precio subiendo <=2% (plano o cayendo)
  funding_low_percentile: 20   # funding <=0 y en el percentil bajo = shorts pagando
  ls_long_max: 0.45            # long ratio por debajo de esto = cortos masificados
  stop_cluster_max_distance_pct: 0.10  # solo clusters de stops a <=10% del precio
  compression_percentile: 15   # ancho de Bollinger en percentil <=15 = muelle comprimido
  setup_score_min: 55          # score minimo para marcar squeeze_setup_flag
  setup_min_oi_points: 15      # ...y el componente OI debe aportar al menos esto
  # Pesos por componente; pon a 0 los que no te convenzan (funding/ls).
  weight_oi_build: 35
  weight_stop_magnet: 15
  weight_compression: 10
  weight_basis: 15
  weight_funding: 15
  weight_ls: 10

accumulation:
  enabled: true
  lookback: 20                 # velas para medir CVD y build de OI
  cvd_full_share: 0.12         # desequilibrio comprador (share del volumen) para puntos maximos
  price_quiet_max_pct: 0.05    # acumulacion = el precio aun no ha corrido mas de esto
  accum_score_min: 55          # score minimo para whale_accum_flag
  accum_min_flow_points: 15    # ...y CVD+OI deben aportar al menos esto
  retail_long_max: 0.55        # retail (ratio global) por debajo = la masa aun no ha entrado
  spot_full_ratio: 2.0         # ratio volumen spot/perp para puntos maximos
  spot_led_ratio_min: 1.0      # ratio minimo para marcar SPOT-LED
  ignition_lookback: 6         # velas previas con acumulacion para validar ignicion
  ignition_min_prior_score: 45
  ignition_volume_zscore: 2.0  # vela verde con este zscore de volumen = retail entrando
  # Pesos por componente del score de ballenas.
  weight_cvd: 30
  weight_oi_price: 20
  weight_top_position: 15
  weight_spot: 20
  weight_retail_out: 15

coinalyze_dashboard:
  enabled: true
  timeframes:
  - 4h
  - 1d
  cache_dir: data/coinalyze
  max_age_hours: 6
  core_exchanges:
  - BINANCE
  - BYBIT
  - OKX
