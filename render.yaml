services:
  - type: web
    name: crypto-pump-detector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=src streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"

